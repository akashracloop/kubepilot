name: Eval Gate

# Release-blocking accuracy/calibration regression gate (Phase 3 W8). Runs the
# live golden eval and compares the result to the committed baseline
# (eval/baselines/golden.json); blocks when accuracy or mean score regresses >5%,
# or calibration (ECE) worsens >5%. Runs on release tags and manual dispatch.
# Requires the ANTHROPIC_API_KEY repo secret; skips cleanly if unset so forks
# without a key don't see red runs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Promote this run's metrics as the new baseline"
        type: boolean
        default: false

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install workspace
        run: uv sync --all-packages

      # Deterministic gate-logic self-test (no key): drift math + calibration.
      - name: Gate self-test
        run: uv run pytest eval/harness/test_drift.py eval/harness/test_calibration_eval.py -p no:cacheprovider

      - name: Run eval gate (live)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping live eval gate."
            exit 0
          fi
          if [ "${{ inputs.update_baseline }}" = "true" ]; then
            uv run python -m eval.harness.eval_gate --update-baseline
          else
            uv run python -m eval.harness.eval_gate
          fi
