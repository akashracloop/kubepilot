name: Nightly Eval

# Full golden-scenario RCA eval against a real LLM. Runs nightly and on manual
# dispatch. Requires the ANTHROPIC_API_KEY repo secret; skips cleanly if unset so
# forks without a key don't see red runs. Baseline gate: aggregate score >= 0.70
# (run_eval.py exits non-zero below that).
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {}

jobs:
  golden-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install workspace
        run: uv sync --all-packages

      # Deterministic evals (no key) — memory-A/B + timeline uplift reports.
      - name: Memory A/B (scripted)
        run: uv run python -m eval.harness.memory_ab

      - name: Timeline eval (scripted)
        run: uv run python -m eval.harness.timeline_eval

      # Live golden + held-out accuracy (needs a key). run_eval scores golden
      # (the gate) and the held-out set separately, reporting the overfit gap.
      - name: Run golden + held-out RCA eval (live)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping live eval."
            exit 0
          fi
          uv run python -m eval.harness.run_eval
