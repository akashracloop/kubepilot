name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Helm is required so tests/test_rbac.py actually renders the chart and
      # asserts the read-only ClusterRole. Without it that test SKIPS silently,
      # giving a false green on the project's core safety guarantee.
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.3"

      - name: Install workspace
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      # Scoped to src/: strict mypy is clean-ish on product code and this avoids
      # duplicate-test-module resolution errors. Still non-blocking — full strict
      # coverage (incl. third-party stubs) is a tracked follow-up, not a W1 gate.
      - name: Type check (mypy)
        run: uv run mypy services/*/src
        continue-on-error: true

      - name: Unit tests
        run: uv run pytest -m "not integration and not live_llm" --cov=services --cov-report=term

      # Deterministic eval-harness self-test (scorer math + runner plumbing).
      # The full golden-scenario run against a real LLM is the nightly eval.yml job.
      - name: Eval harness self-test
        run: uv run pytest eval -p no:cacheprovider

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kubepilot
          POSTGRES_PASSWORD: kubepilot
          POSTGRES_DB: kubepilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kubepilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install workspace
        # psycopg[binary] bundles libpq so the pgvector/knowledge stores connect
        # without a system libpq (the prod image ships it in the container).
        run: uv sync --all-packages && uv pip install "psycopg[binary]"
      - name: Integration tests (real Postgres + pgvector)
        env:
          KUBEPILOT_TEST_DB_URL: postgresql://kubepilot:kubepilot@localhost:5432/kubepilot
        run: uv run pytest -m integration -p no:cacheprovider

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "v3.17.3"
      - name: Helm lint
        run: |
          helm lint charts/kubepilot-ai
