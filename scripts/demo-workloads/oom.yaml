# A pod that allocates more memory than its limit → OOMKilled → CrashLoopBackOff.
# Gives the Kubernetes + Metrics + Logs agents a real OOM to investigate.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: demo
  labels:
    app: oom-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
        - name: app
          image: polinux/stress:latest
          command: ["stress"]
          # Allocate 250Mi against a 64Mi limit → the kernel OOM-kills it.
          args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "0", "--verbose"]
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi
