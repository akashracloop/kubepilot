# Default values for KubePilot AI.
# Profile overrides: values-dev.yaml / values-prod-small.yaml / values-prod-air-gapped.yaml

global:
  imageRegistry: ghcr.io/akashsahani2001
  imagePullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# LLM provider configuration (BYOK — see docs/llm-providers.md)
# -----------------------------------------------------------------------------
llm:
  defaultProvider: anthropic
  roles:
    routing: { provider: anthropic, model: claude-haiku-4-5-20251001 }
    analysis: { provider: anthropic, model: claude-sonnet-4-6 }
    summarization: { provider: anthropic, model: claude-haiku-4-5-20251001 }
    critique: { provider: anthropic, model: claude-sonnet-4-6 } # Phase 3 critic (strong model)
  ollama:
    baseUrl: http://ollama.kubepilot-system.svc.cluster.local:11434
  vllm:
    baseUrl: http://vllm.kubepilot-system.svc.cluster.local:8000/v1

  # Credentials Secret. The gateway reads these keys (all optional) from it:
  #   anthropic_api_key, openai_api_key, azure_api_key, azure_endpoint, bedrock_region
  # In prod, create the Secret out of band with those keys. For dev, put values
  # under `credentials` below and the chart renders the Secret for you.
  secretName: kubepilot-llm-credentials
  credentials: {} # e.g. { anthropic_api_key: "sk-ant-...", openai_api_key: "" }

# -----------------------------------------------------------------------------
# API gateway — also hosts the LangGraph orchestrator in-process (Phase 1, the
# orchestrator is a library, not a separate server), so this one Deployment is
# the app tier. It reads both KUBEPILOT_API_* (gateway) and KUBEPILOT_* (orch).
# -----------------------------------------------------------------------------
apiGateway:
  replicaCount: 1
  image:
    repository: kubepilot-api
    tag: 0.1.0-dev
  service:
    type: ClusterIP
    port: 8080
  # Investigation record store: "postgres" or "memory" (dev / no-DB).
  storage: postgres
  # LangGraph checkpointer backend: "postgres" (resumable) or "memory" (dev).
  checkpointer: postgres
  auth:
    # Static X-API-Key auth. The gateway reads key `api_key` from `secretName`
    # (optional — if the Secret/key is absent, auth is DISABLED; dev only).
    # Set `apiKey` to have the chart render the Secret; else create it out of band.
    secretName: kubepilot-api-auth
    apiKey: ""
  # Phase 3 features (see docs/features/). The critic is on by default; knowledge
  # graph + calibration are opt-in (empty until a snapshot / trained calibrator is
  # provided). promptActiveVersions pins a prompt to a version (the rollback lever).
  phase3:
    criticEnabled: true
    knowledgeEnabled: false
    knowledgeSnapshotPath: "" # e.g. /etc/kubepilot/knowledge/snapshot.json (mounted)
    calibratorPath: "" # e.g. /etc/kubepilot/calibrator.json (mounted)
    promptActiveVersions: {} # e.g. {"rca_agent": "v1"} to roll a prompt back
    timelineLlmLabels: false # opt-in LLM polish of timeline labels (adds a call)
    # Periodic knowledge-graph ingestion (the CronJob trigger). Point
    # snapshotConfigMap at a ConfigMap holding key `snapshot.json` (your exported
    # service catalog / label scan); it's ingested into Postgres on the schedule.
    knowledgeIngest:
      enabled: false
      schedule: "*/30 * * * *"
      snapshotConfigMap: ""
  # Extra env vars appended LAST (so they override templated ones). Use to repoint
  # MCP endpoints at a replacement server, e.g. a Grafana MCP. See docs/mcp-adapters.md.
  extraEnv: {}
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi

# -----------------------------------------------------------------------------
# Web UI (Next.js)
# -----------------------------------------------------------------------------
webUi:
  enabled: true
  replicaCount: 1
  image:
    repository: kubepilot-web-ui
    tag: 0.1.0-dev
  service:
    type: ClusterIP
    port: 3000
  # Public base URL the browser uses to reach the API gateway. Override per
  # ingress/host. Defaults to in-cluster service DNS for port-forward demos.
  apiBaseUrl: ""

# -----------------------------------------------------------------------------
# Slack bot (Phase 2) — off by default. Socket Mode, so no ingress needed.
# -----------------------------------------------------------------------------
slackBot:
  enabled: false
  replicaCount: 1
  image:
    repository: kubepilot-slack
    tag: 0.1.0-dev
  defaultNamespace: prod
  # Secret with keys `bot_token` (xoxb-...) and `app_token` (xapp-..., Socket Mode).
  tokenSecretRef: kubepilot-slack-tokens

# -----------------------------------------------------------------------------
# MCP servers
# -----------------------------------------------------------------------------
mcp:
  k8s:
    enabled: true
    image: { repository: kubepilot-mcp-k8s, tag: 0.1.0-dev }
    # Read-only RBAC by default. Override scope: "namespace" to limit to listed namespaces.
    rbac:
      scope: cluster # one of: cluster | namespace
      namespaces: [] # used only when scope == "namespace"
  prom:
    enabled: true
    image: { repository: kubepilot-mcp-prom, tag: 0.1.0-dev }
    upstream:
      url: http://prom-server.observability.svc.cluster.local
      bearerTokenSecretRef: "" # optional
  loki:
    enabled: true
    image: { repository: kubepilot-mcp-loki, tag: 0.1.0-dev }
    upstream:
      url: http://loki.observability.svc.cluster.local:3100
      bearerTokenSecretRef: ""
  # Phase 2 — off by default; enable when Tempo / a CI backend is available.
  # When enabled, the gateway adds the Tracing / Deployment specialist branches.
  tempo:
    enabled: false
    image: { repository: kubepilot-mcp-tempo, tag: 0.1.0-dev }
    upstream:
      url: http://tempo.observability.svc.cluster.local:3200
      bearerTokenSecretRef: "" # optional
  ci:
    enabled: false
    image: { repository: kubepilot-mcp-ci, tag: 0.1.0-dev }
    backend: github_actions # github_actions | jenkins | argocd
    url: "" # backend API base URL
    tokenSecretRef: "" # Secret (key: token) with a read-only CI token
  # Phase 3 — Datadog observability adapter (reference). Off by default. When
  # enabled, point the metrics/logs capabilities at it (see values-datadog.yaml):
  # a config-only swap that maps Datadog → KubePilot's curated shapes.
  datadog:
    enabled: false
    image: { repository: kubepilot-mcp-datadog, tag: 0.1.0-dev }
    site: datadoghq.com # DD_SITE, e.g. datadoghq.eu / us5.datadoghq.com
    # Secret holding read-only Datadog credentials (keys: api-key, app-key).
    credentialsSecretRef: ""

# -----------------------------------------------------------------------------
# Phase 4 remediation (WRITES). OFF by default. When enabled, deploys the
# mcp-k8s-write server with its OWN least-privilege ClusterRole + a restrictive
# NetworkPolicy, plus the execution-policy ConfigMap, and turns on the gateway's
# HITL approval gate. Even then, writes are DRY-RUN until applyEnabled=true.
# The read/write bright line — do not enable without reviewing the policies.
# -----------------------------------------------------------------------------
remediation:
  enabled: false
  image: { repository: kubepilot-mcp-k8s-write, tag: 0.1.0-dev }
  # Master switch for real cluster mutation. false → the write server dry-runs
  # everything even when remediation is enabled.
  applyEnabled: false
  # Override the shipped reference policies with your own (a YAML string keyed as
  # policies.yaml in the ConfigMap). Empty → the reference set is used.
  policiesYaml: ""

# -----------------------------------------------------------------------------
# Persistence — bundled single-node Postgres/Redis for dev & prod-small. For
# production, set enabled=false and point externalUrl at a managed instance.
# -----------------------------------------------------------------------------
postgres:
  enabled: true
  image: pgvector/pgvector:pg16 # pgvector for Phase 2 embeddings
  auth:
    username: kubepilot
    password: kubepilot # dev default — override or use externalUrl in prod
    database: kubepilot
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  externalUrl: "" # used when enabled=false, e.g. postgresql://user:pass@host:5432/db

redis:
  enabled: true
  image: redis:7-alpine
  externalUrl: "" # used when enabled=false, e.g. redis://host:6379/0

# -----------------------------------------------------------------------------
# AgentOps observability
# -----------------------------------------------------------------------------
agentOps:
  phoenix:
    enabled: true # default — self-hosted, OSS, OTel-GenAI compatible
    image: arizephoenix/phoenix:latest
    service:
      port: 6006
  langsmith:
    enabled: false # opt-in BYOK
    apiKeySecretRef: ""
