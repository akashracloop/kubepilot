{{- if and (not .Values.apiGateway.auth.existingSecret) .Values.apiGateway.auth.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubepilot.fullname" . }}-api-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-auth
type: Opaque
stringData:
  # Loaded into the gateway via envFrom → enforces X-API-Key auth.
  KUBEPILOT_API_AUTH__API_KEY: {{ .Values.apiGateway.auth.apiKey | quote }}
{{- end }}
