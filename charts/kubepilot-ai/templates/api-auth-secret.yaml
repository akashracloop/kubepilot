{{- if .Values.apiGateway.auth.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.apiGateway.auth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-auth
type: Opaque
stringData:
  api_key: {{ .Values.apiGateway.auth.apiKey | quote }}
{{- end }}
