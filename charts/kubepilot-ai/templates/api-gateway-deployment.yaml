apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubepilot.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubepilot.name" . }}
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      labels:
        {{- include "kubepilot.labels" . | nindent 8 }}
        app.kubernetes.io/component: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["uvicorn", "--factory", "kubepilot_api.main:build_app", "--host", "0.0.0.0", "--port", "8080"]
          env:
            # ---- API gateway settings (KUBEPILOT_API_*) ----
            - name: KUBEPILOT_API_ENVIRONMENT
              value: production
            - name: KUBEPILOT_API_STORAGE
              value: {{ .Values.apiGateway.storage | quote }}
            - name: KUBEPILOT_API_CHECKPOINTER
              value: {{ .Values.apiGateway.checkpointer | quote }}
            {{- if or .Values.postgres.enabled .Values.postgres.externalUrl }}
            - name: KUBEPILOT_API_DB__URL
              value: {{ include "kubepilot.postgres.url" . | quote }}
            {{- end }}
            - name: KUBEPILOT_API_MCP__K8S
              value: "http://mcp-k8s.{{ .Release.Namespace }}.svc.cluster.local:8080"
            - name: KUBEPILOT_API_MCP__PROM
              value: "http://mcp-prom.{{ .Release.Namespace }}.svc.cluster.local:8080"
            - name: KUBEPILOT_API_MCP__LOKI
              value: "http://mcp-loki.{{ .Release.Namespace }}.svc.cluster.local:8080"
            {{- if .Values.mcp.tempo.enabled }}
            - name: KUBEPILOT_API_MCP__TEMPO
              value: "http://mcp-tempo.{{ .Release.Namespace }}.svc.cluster.local:8080"
            {{- end }}
            {{- if .Values.mcp.ci.enabled }}
            - name: KUBEPILOT_API_MCP__CI
              value: "http://mcp-ci.{{ .Release.Namespace }}.svc.cluster.local:8080"
            {{- end }}
            # ---- Phase 3 features (critic / knowledge / calibration / prompt pins) ----
            - name: KUBEPILOT_API_CRITIC_ENABLED
              value: {{ .Values.apiGateway.phase3.criticEnabled | quote }}
            - name: KUBEPILOT_API_KNOWLEDGE_ENABLED
              value: {{ .Values.apiGateway.phase3.knowledgeEnabled | quote }}
            - name: KUBEPILOT_API_TIMELINE_LLM_LABELS
              value: {{ .Values.apiGateway.phase3.timelineLlmLabels | quote }}
            {{- if .Values.apiGateway.phase3.knowledgeSnapshotPath }}
            - name: KUBEPILOT_API_KNOWLEDGE_SNAPSHOT_PATH
              value: {{ .Values.apiGateway.phase3.knowledgeSnapshotPath | quote }}
            {{- end }}
            {{- if .Values.apiGateway.phase3.calibratorPath }}
            - name: KUBEPILOT_API_CALIBRATOR_PATH
              value: {{ .Values.apiGateway.phase3.calibratorPath | quote }}
            {{- end }}
            {{- if .Values.apiGateway.phase3.promptActiveVersions }}
            - name: KUBEPILOT_API_PROMPT_ACTIVE_VERSIONS
              value: {{ .Values.apiGateway.phase3.promptActiveVersions | toJson | quote }}
            {{- end }}
            # ---- Orchestrator settings (in-process, KUBEPILOT_*) ----
            {{- if or .Values.postgres.enabled .Values.postgres.externalUrl }}
            - name: KUBEPILOT_DB__URL
              value: {{ include "kubepilot.postgres.url" . | quote }}
            {{- end }}
            {{- if or .Values.redis.enabled .Values.redis.externalUrl }}
            - name: KUBEPILOT_REDIS__URL
              value: {{ include "kubepilot.redis.url" . | quote }}
            {{- end }}
            - name: KUBEPILOT_LLM__DEFAULT_PROVIDER
              value: {{ .Values.llm.defaultProvider | quote }}
            - name: KUBEPILOT_LLM__ROLES
              value: {{ .Values.llm.roles | toJson | quote }}
            - name: KUBEPILOT_LLM__OLLAMA_BASE_URL
              value: {{ .Values.llm.ollama.baseUrl | quote }}
            - name: KUBEPILOT_LLM__VLLM_BASE_URL
              value: {{ .Values.llm.vllm.baseUrl | quote }}
            {{- if .Values.agentOps.phoenix.enabled }}
            - name: KUBEPILOT_OTEL_EXPORTER_ENDPOINT
              value: "http://{{ include "kubepilot.fullname" . }}-phoenix.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.agentOps.phoenix.service.port }}"
            {{- end }}
            # ---- LLM credentials (all optional — absent keys leave the env unset) ----
            {{- range $envKey, $secretKey := dict "KUBEPILOT_LLM__ANTHROPIC_API_KEY" "anthropic_api_key" "KUBEPILOT_LLM__OPENAI_API_KEY" "openai_api_key" "KUBEPILOT_LLM__AZURE_API_KEY" "azure_api_key" "KUBEPILOT_LLM__AZURE_ENDPOINT" "azure_endpoint" "KUBEPILOT_LLM__BEDROCK_REGION" "bedrock_region" }}
            - name: {{ $envKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.llm.secretName }}
                  key: {{ $secretKey }}
                  optional: true
            {{- end }}
            # ---- API auth key (optional — if unset, the gateway runs open; dev only) ----
            - name: KUBEPILOT_API_AUTH__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiGateway.auth.secretName }}
                  key: api_key
                  optional: true
            # ---- Operator overrides (last wins) — e.g. repoint MCP__PROM/LOKI/TEMPO
            #      at a single Grafana MCP server. See docs/mcp-adapters.md.
            {{- range $k, $v := .Values.apiGateway.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          # Writable /tmp under a read-only root fs — tiktoken (via langchain_openai)
          # and other libs need a temp dir for their caches.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
