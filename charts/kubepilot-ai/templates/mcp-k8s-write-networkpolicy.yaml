{{- if .Values.remediation.enabled }}
{{- /*
  Restrict the write server: only the api-gateway (which hosts the orchestrator +
  the HITL approval gate) may reach its :8080. Nothing else in the cluster can
  invoke a write tool directly.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-k8s-write
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubepilot.name" . }}
      app.kubernetes.io/component: mcp-k8s-write
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "kubepilot.name" . }}
              app.kubernetes.io/component: api-gateway
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
