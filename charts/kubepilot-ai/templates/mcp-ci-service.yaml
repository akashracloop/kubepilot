{{- if .Values.mcp.ci.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mcp-ci
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-ci
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "kubepilot.name" . }}
    app.kubernetes.io/component: mcp-ci
{{- end }}
