{{- if .Values.remediation.enabled }}
{{- /*
  Least-privilege ClusterRole for the mcp-k8s-write ServiceAccount (Phase 4).

  This is the ONLY write grant in the whole platform, and it is deliberately
  minimal: exactly the verbs × resources the curated write tools need
  (see services/mcp-k8s-write/src/mcp_k8s_write/safety.py::required_rbac()) and
  NOTHING else. In particular it grants NO delete on secrets / pvc / pv /
  namespaces. services/mcp-k8s-write/tests/test_rbac_write.py renders this chart
  and fails if the role drifts from the tool footprint.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-k8s-write
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-k8s-write
rules:
  # apps
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  # core
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-k8s-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
subjects:
  - kind: ServiceAccount
    name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
    namespace: {{ .Release.Namespace }}
{{- end }}
