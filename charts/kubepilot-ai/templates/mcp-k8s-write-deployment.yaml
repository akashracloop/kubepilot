{{- if .Values.remediation.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-k8s-write
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubepilot.name" . }}
      app.kubernetes.io/component: mcp-k8s-write
  template:
    metadata:
      labels:
        {{- include "kubepilot.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-k8s-write
    spec:
      serviceAccountName: {{ include "kubepilot.fullname" . }}-mcp-k8s-write
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-k8s-write
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.remediation.image.repository }}:{{ .Values.remediation.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # Master apply switch — dry-run unless explicitly turned on.
            - name: KUBEPILOT_WRITE_APPLY_ENABLED
              value: {{ .Values.remediation.applyEnabled | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /mcp/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /mcp/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
{{- end }}
