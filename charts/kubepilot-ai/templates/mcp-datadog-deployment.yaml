{{- if .Values.mcp.datadog.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubepilot.fullname" . }}-mcp-datadog
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-datadog
spec:
  replicas: {{ .Values.mcp.datadog.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubepilot.name" . }}
      app.kubernetes.io/component: mcp-datadog
  template:
    metadata:
      labels:
        {{- include "kubepilot.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-datadog
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-datadog
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.mcp.datadog.image.repository }}:{{ .Values.mcp.datadog.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DD_SITE
              value: {{ .Values.mcp.datadog.site | quote }}
            {{- if .Values.mcp.datadog.credentialsSecretRef }}
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.datadog.credentialsSecretRef }}
                  key: api-key
            - name: DD_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.datadog.credentialsSecretRef }}
                  key: app-key
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /mcp/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /mcp/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
{{- end }}
