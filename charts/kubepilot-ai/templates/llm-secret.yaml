{{- if gt (len (keys .Values.llm.credentials)) 0 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.llm.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-credentials
type: Opaque
stringData:
  # Rendered verbatim from .Values.llm.credentials. The gateway maps recognised
  # keys (anthropic_api_key, openai_api_key, azure_api_key, azure_endpoint,
  # bedrock_region) into orchestrator env vars. Extra keys are ignored.
  {{- range $key, $val := .Values.llm.credentials }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
