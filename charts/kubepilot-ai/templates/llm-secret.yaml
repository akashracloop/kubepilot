{{- if and (not .Values.llm.existingSecret) (gt (len (keys .Values.llm.credentials)) 0) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubepilot.fullname" . }}-llm-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-credentials
type: Opaque
stringData:
  # Rendered from .Values.llm.credentials — each key becomes an orchestrator env
  # var (KUBEPILOT_LLM__<KEY>) via envFrom on the api-gateway pod.
  {{- range $key, $val := .Values.llm.credentials }}
  {{ printf "KUBEPILOT_LLM__%s" (upper $key) }}: {{ $val | quote }}
  {{- end }}
{{- end }}
