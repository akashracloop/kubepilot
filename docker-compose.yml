services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kubepilot-postgres
    environment:
      POSTGRES_USER: kubepilot
      POSTGRES_PASSWORD: kubepilot
      POSTGRES_DB: kubepilot
    ports:
      - "5432:5432"
    volumes:
      - kubepilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubepilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kubepilot-redis
    ports:
      - "6379:6379"
    volumes:
      - kubepilot-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kubepilot-postgres-data:
  kubepilot-redis-data:
